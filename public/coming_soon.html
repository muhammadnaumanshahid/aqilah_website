<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home with Aqilah | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #faf9f6; /* Sophisticated warm cream */
            color: #2c2c2c; /* Soft black */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle animated background gradient */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(230,224,212,0.6) 0%, rgba(250,249,246,0) 70%);
            animation: pulseBg 15s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-w-3xl: 800px;
            animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp {
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #737373;
            margin-bottom: 3rem;
            display: block;
        }

        p {
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            font-weight: 300;
            color: #595959;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }

        .contact-info {
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .contact-info a {
            color: #1a1a1a;
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.3s ease;
        }

        .contact-info a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #1a1a1a;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .contact-info a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Subtle glowing line */
        .line {
            height: 1px;
            width: 80px;
            background-color: #d1cbc1;
            margin: 2rem auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Home with Aqilah</h1>
        <span class="subtitle">Interior Architecture & Design</span>
        
        <div class="line"></div>

        <p>We are currently curating a highly refined digital experience.<br>Our new website will be launching soon.</p>

        <div class="contact-info">
            In the meantime, reach out to us at<br>
            <a href="mailto:hello@homewithaqilah.com" style="display:inline-block; margin-top:0.5rem; font-weight:500;">hello@homewithaqilah.com</a>
        </div>
    </div>

</body>
</html>
