<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Home with Aqilah</title>
    <meta name="description" id="page-meta-description" content="Explore this interior design project by Home with Aqilah.">
    <meta property="og:title" content="Project Details | Home with Aqilah">
    <meta property="og:description" content="Explore this interior design project by Home with Aqilah.">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
    <meta name="description" id="page-meta-description" content="Explore this interior design project by Home with Aqilah.">
    <link rel="stylesheet" href="style.css">
    <style>
        .project-hero {
            height: 60vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            margin-top: 80px;
        }
        .project-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        }
        .project-hero h1 { position: relative; z-index: 10; font-size: 3rem; margin-bottom: 0.5rem; }
        .project-hero p { position: relative; z-index: 10; font-size: 1.25rem; font-family: 'Outfit', sans-serif;}
        
        .project-details { padding: 4rem 2rem; max-width: 56rem; margin: 0 auto; }
        .project-details p { font-family: 'Outfit', sans-serif; font-size: 1.1rem; line-height: 1.8; color: #444; margin-bottom: 1.5rem; }
        .project-details h2, .project-details h3 { font-family: 'Playfair Display', serif; color: #1a1a1a; margin-top: 2rem; margin-bottom: 1rem; }
        
        /* Utility */
        .loading { text-align: center; padding: 5rem; font-size: 1.2rem; font-family: 'Outfit', sans-serif;}

        /* ---- LIGHTBOX ---- */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            cursor: zoom-out;
        }
        #lightbox.open { opacity: 1; visibility: visible; }
        #lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 3px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: scale(0.92);
            transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
            cursor: default;
            display: block;
        }
        #lightbox.open #lightbox-img { transform: scale(1); }
        #lightbox-caption {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
        }
        #lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            z-index: 10001;
        }
        #lightbox-close:hover { background: rgba(255,255,255,0.25); }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            z-index: 10001;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        #lightbox-prev { left: 1.5rem; }
        #lightbox-next { right: 1.5rem; }
        /* Gallery image hints */
        .gallery-item img, .curated-gallery img {
            cursor: zoom-in;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .gallery-item img:hover, .curated-gallery img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <!-- LIGHTBOX -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button id="lightbox-close" aria-label="Close lightbox">&times;</button>
        <button class="lightbox-nav" id="lightbox-prev" aria-label="Previous image">&#8592;</button>
        <img id="lightbox-img" src="" alt="Full size view">
        <button class="lightbox-nav" id="lightbox-next" aria-label="Next image">&#8594;</button>
        <p id="lightbox-caption"></p>
    </div>
    <header class="navbar" id="navbar">
        <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 0.8rem;">
            <img src="images/logo.jpg" alt="Home with Aqilah" style="height: 32px; border-radius: 2px;">
            <span>HOME WITH <span class="accent">AQILAH</span></span>
        </a>
        <nav>
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="index.html#enquire" class="btn-primary">Enquire</a>
        </nav>
        <div class="mobile-menu-btn" id="mobile-menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main id="dynamic-project-container">
        <div class="loading">Loading project details...</div>
    </main>

    <footer style="background-color: var(--color-bg-alt); padding: 4rem 0 2rem; border-top: 1px solid rgba(0,0,0,0.05); text-align: center;">
        <div class="container text-center">
            <p style="font-size: 0.85rem; color: var(--color-text-light); margin: 0;">&copy; 2026 Home with Aqilah. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js?v=2" defer></script>
    <script>
        // ---- LIGHTBOX ENGINE ----
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const lightboxClose = document.getElementById('lightbox-close');
        const lightboxPrev = document.getElementById('lightbox-prev');
        const lightboxNext = document.getElementById('lightbox-next');
        let lbImages = []; // [{src, caption}]
        let lbIndex = 0;

        function openLightbox(index) {
            lbIndex = index;
            lightboxImg.src = lbImages[lbIndex].src;
            lightboxCaption.textContent = lbImages[lbIndex].caption || '';
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
            updateNavVisibility();
        }
        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
            setTimeout(() => { lightboxImg.src = ''; }, 350);
        }
        function showPrev() {
            if (lbIndex > 0) { lbIndex--; lightboxImg.src = lbImages[lbIndex].src; lightboxCaption.textContent = lbImages[lbIndex].caption || ''; updateNavVisibility(); }
        }
        function showNext() {
            if (lbIndex < lbImages.length - 1) { lbIndex++; lightboxImg.src = lbImages[lbIndex].src; lightboxCaption.textContent = lbImages[lbIndex].caption || ''; updateNavVisibility(); }
        }
        function updateNavVisibility() {
            lightboxPrev.style.opacity = lbIndex === 0 ? '0.2' : '1';
            lightboxNext.style.opacity = lbIndex === lbImages.length - 1 ? '0.2' : '1';
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightboxPrev.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
        lightboxNext.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') showPrev();
            if (e.key === 'ArrowRight') showNext();
        });

        // Touch swipe support
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
        lightbox.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) { dx < 0 ? showNext() : showPrev(); }
        });

        // Hook after dynamic project content loads
        function initLightbox() {
            const galleryImgs = document.querySelectorAll('.gallery-item img, .curated-gallery img');
            lbImages = Array.from(galleryImgs).map(img => ({
                src: img.src,
                caption: img.closest('.gallery-item')?.querySelector('.micro-caption')?.textContent || ''
            }));
            galleryImgs.forEach((img, idx) => {
                img.addEventListener('click', () => openLightbox(idx));
            });
            // Also make hero clickable
            const heroSection = document.querySelector('.project-hero');
            if (heroSection) {
                const heroUrl = heroSection.style.backgroundImage?.match(/url\(['"]?([^'"\)]+)['"]?\)/);
                if (heroUrl && heroUrl[1]) {
                    lbImages.unshift({ src: heroUrl[1], caption: '' });
                    // Shift all click indices by 1
                    galleryImgs.forEach((img, idx) => {
                        img.removeEventListener('click', () => {});
                        img.addEventListener('click', () => openLightbox(idx + 1));
                    });
                }
            }
        }
        // Expose for the project loader script below to call
        window._initLightbox = initLightbox;
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('dynamic-project-container');
            
            if (!id) {
                container.innerHTML = '<div class="loading">Project not found.</div>';
                return;
            }

            try {
                const res = await fetch(`/api/projects/${id}`);
                if (!res.ok) throw new Error('Not found');
                const p = await res.json();
                
                if(p) {
                    document.title = p.title + " | Home with Aqilah";
                    const metaDesc = document.getElementById('page-meta-description');
                    if (metaDesc) metaDesc.setAttribute('content', `${p.title} — Interior design project by Home with Aqilah. Located in ${p.location}.`);
                    const app = document.getElementById('dynamic-project-container');
                    
                    let c = {};
                    let isJson = false;
                    try { 
                        c = JSON.parse(p.content); 
                        isJson = true; 
                    } catch(e) {}
                    
                    let contentHtml = '';
                    if (isJson) {
                        contentHtml = `
                            <div class="project-meta scroll-animate delay-1">
                                <div class="meta-item"><span class="meta-label">Scope</span><span class="meta-value">${c.scope || '-'}</span></div>
                                <div class="meta-item"><span class="meta-label">Style</span><span class="meta-value">${c.style || '-'}</span></div>
                                <div class="meta-item"><span class="meta-label">Location</span><span class="meta-value">${p.location || '-'}</span></div>
                                <div class="meta-item"><span class="meta-label">Timeline</span><span class="meta-value">${c.timeline || '-'}</span></div>
                            </div>

                            <section class="project-narrative">
                                <div class="narrative-block scroll-animate">
                                    <h3>The Challenge</h3>
                                    <p>${c.challenge || ''}</p>
                                </div>
                                <div class="narrative-block scroll-animate delay-1">
                                    <h3>The Solution</h3>
                                    <p>${c.solution || ''}</p>
                                </div>
                            </section>

                            <section class="curated-gallery">
                                ${(c.gallery || []).filter(g => g.image).map((g, idx) => `
                                    <div class="gallery-item scroll-animate ${idx % 2 === 1 ? 'delay-1' : ''}">
                                        <img src="${g.image}" alt="Gallery Image${g.caption ? ' — ' + g.caption : ''}">
                                        ${g.caption ? `<p class="micro-caption">${g.caption}</p>` : ''}
                                    </div>
                                `).join('')}
                            </section>

                            ${c.testimonial && c.testimonial.quote ? `
                            <section class="project-testimonial scroll-animate">
                                <p>"${c.testimonial.quote}"</p>
                                <span class="client-name">— ${c.testimonial.client}</span>
                            </section>` : ''}

                            <section class="project-cta scroll-animate">
                                <h2>Inspired by this space?</h2>
                                <p style="font-size: 1.2rem; color: var(--color-text-light); margin-bottom: 3rem;">Let's discuss how we can bring your vision to life.</p>
                                <a href="index.html#enquire" class="btn-primary">Book a Consultation</a>
                                <div style="margin-top: 2rem;">
                                    <a href="portfolio.html" style="color: var(--color-text-dark); text-decoration: underline; font-size: 0.9rem;">Or return to portfolio</a>
                                </div>
                            </section>
                        `;
                    } else {
                        contentHtml = p.content;
                    }

                    app.innerHTML = `
                        <section class="project-hero fade-in" style="background-image: url('${p.main_image}');">
                            <div class="project-hero-content">
                                <h1>${p.title}</h1>
                                <p>${p.location}</p>
                            </div>
                        </section>
                        <main class="container">
                            <a href="portfolio.html" style="color: #444; text-decoration: underline; font-size:0.9rem; margin-bottom: 2rem; display:inline-block;">&larr; Back to Portfolio</a>
                            ${contentHtml}
                        </main>
                    `;
                    
                    setTimeout(() => {
                        document.querySelectorAll('.scroll-animate, .fade-in').forEach(el => el.classList.add('visible'));
                        // Init lightbox after DOM is painted
                        if (window._initLightbox) window._initLightbox();
                    }, 50);
                }
            } catch (err) {
                container.innerHTML = '<div class="loading">Project not found or an error occurred.</div>';
            }
        });
    </script>
</body>
</html>
