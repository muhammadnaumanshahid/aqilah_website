    <style>
        @keyframes pulse {

            50% { transform: scale(1.05); opacity: 1; }

        }
    </style>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {

                    preloader.style.visibility = 'hidden';

        });
