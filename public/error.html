<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Home with Aqilah</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #F8F7F5;
            --color-text: #2A2A2A;
            --color-accent: #7A2828;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 400;
            color: var(--color-accent);
            line-height: 1;
            margin-bottom: 1rem;
        }
        p { font-size: 1.25rem; color: #6C6A65; margin-bottom: 2rem; }
        a {
            display: inline-block;
            background-color: var(--color-accent);
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 2px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>This page has wandered off the design plan.</p>
    <a href="index.html">Back to Home</a>
</body>
</html>
